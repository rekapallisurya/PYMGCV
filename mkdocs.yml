# ──────────────────────────────────────────────────────────────────────
# MkDocs configuration for pymgcv
# Build:  mkdocs build
# Serve:  mkdocs serve
# Deploy: mkdocs gh-deploy
# ──────────────────────────────────────────────────────────────────────

site_name: pymgcv
site_description: Production-grade Generalized Additive Models with numerical equivalence to R's mgcv
site_url: https://surya.github.io/pymgcv
repo_url: https://github.com/surya/pymgcv
repo_name: surya/pymgcv

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - User Guide:
    - GAM Modeling: user-guide/gam-modeling.md
    - Comparison with R mgcv: user-guide/comparison-with-r.md
  - API Reference:
    - api/index.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
